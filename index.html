<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ Connect | Sandra Júlia Cabelo & Maquiagem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   SANDRA JÚLIA — DESIGN TOKENS
   Palette: nude / rosa quartzo / dourado / branco / preto
   Display: Cormorant Garamond (editorial serif, salon-invitation feel)
   Body/UI: Manrope (clean geometric sans for data-dense screens)
   Signature element: the "fita dourada" (golden ribbon) — a thin gradient
   underline that sweeps in under active nav items, headings and the
   logo mark, echoing a hair ribbon / ribbon on a beauty product box.
   ========================================================================== */
:root{
  --nude-50:#FBF7F2;
  --nude-100:#F3E9DE;
  --nude-200:#E9D9C7;
  --quartz-300:#E7BFC3;
  --quartz-500:#D69AA0;
  --quartz-700:#B06E76;
  --gold-400:#D4B15A;
  --gold-600:#B8892E;
  --gold-800:#8A6317;
  --ink-900:#241E1C;
  --ink-700:#463D39;
  --ink-500:#7A6E68;
  --white:#FFFFFF;
  --success:#5B8C6E;
  --warn:#C99A3A;
  --danger:#B4544A;
  --info:#5D7EA6;

  --font-display:'Cormorant Garamond', serif;
  --font-body:'Manrope', sans-serif;

  --shadow-sm:0 1px 2px rgba(36,30,28,.06);
  --shadow-md:0 6px 20px rgba(36,30,28,.08);
  --shadow-lg:0 16px 40px rgba(36,30,28,.14);
  --radius:14px;
  --radius-sm:8px;
  --sidebar-w:264px;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:var(--font-body);
  background:var(--nude-50);
  color:var(--ink-900);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; margin:0; color:var(--ink-900);}
a{color:inherit;}
button{font-family:inherit;}
::selection{background:var(--quartz-300); color:var(--ink-900);}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-thumb{background:var(--nude-200); border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--quartz-500);}

.ribbon{
  height:3px; width:46px; border-radius:3px; margin-top:6px;
  background:linear-gradient(90deg, var(--gold-600), var(--quartz-500));
}
.hidden{display:none !important;}

/* ---------------------------------- LOGIN ---------------------------------- */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 15% 20%, rgba(212,177,90,.14), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(214,154,160,.18), transparent 45%),
    var(--ink-900);
  padding:24px;
}
.login-card{
  width:100%; max-width:400px; background:var(--white);
  border-radius:20px; box-shadow:var(--shadow-lg);
  padding:44px 38px 36px; text-align:center; position:relative; overflow:hidden;
}
.login-card::before{
  content:""; position:absolute; inset:0 0 auto 0; height:6px;
  background:linear-gradient(90deg, var(--gold-400), var(--quartz-500), var(--gold-600));
}
.brand-mark{
  width:78px; height:78px; margin:0 auto 10px; border-radius:50%;
  background:linear-gradient(150deg, var(--ink-900), var(--ink-700));
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-md); padding:14px;
}
.brand-mark svg{width:100%; height:100%; color:var(--gold-400);}
.app-name{
  font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:800;
  color:var(--ink-500); margin-bottom:2px;
}
.app-name b{color:var(--gold-600);}
.login-card h1{font-size:26px; letter-spacing:.3px; margin-top:2px;}
.login-card .subtitle{
  font-size:11.5px; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--gold-600); margin-top:6px; font-weight:700;
}
.login-card .ribbon{margin:14px auto 26px;}
.field{text-align:left; margin-bottom:16px;}
.field label{
  display:block; font-size:12px; font-weight:700; color:var(--ink-500);
  text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px;
}
.field input, .field select{
  width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--nude-200);
  background:var(--nude-50); font-size:14.5px; font-family:inherit; color:var(--ink-900);
  transition:.15s;
}
.field input:focus, .field select:focus{
  outline:none; border-color:var(--quartz-500); background:var(--white);
  box-shadow:0 0 0 3px rgba(214,154,160,.18);
}
.btn{
  border:none; cursor:pointer; border-radius:10px; font-weight:700; font-size:14px;
  padding:12px 20px; transition:.15s; font-family:inherit; letter-spacing:.2px;
}
.btn-primary{
  width:100%; background:linear-gradient(90deg, var(--ink-900), var(--ink-700));
  color:var(--white); position:relative; overflow:hidden;
}
.btn-primary::after{
  content:""; position:absolute; left:0; right:0; bottom:0; height:2.5px;
  background:linear-gradient(90deg, var(--gold-400), var(--quartz-500));
}
.btn-primary:hover{transform:translateY(-1px); box-shadow:var(--shadow-md);}
.btn-primary:active{transform:translateY(0);}
.login-links{margin-top:16px; font-size:12.5px;}
.login-links a{color:var(--quartz-700); text-decoration:none; font-weight:600; cursor:pointer;}
.login-links a:hover{text-decoration:underline;}
.login-error{
  background:#FBEAE8; color:var(--danger); font-size:12.5px; font-weight:600;
  padding:9px 12px; border-radius:8px; margin-bottom:14px; text-align:left; display:none;
}

/* ---------------------------------- APP SHELL ---------------------------------- */
#app{display:flex; min-height:100vh;}
.sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--ink-900); color:var(--nude-100);
  padding:26px 18px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
  z-index:40;
}
.sidebar-brand{display:flex; align-items:center; gap:12px; padding:0 8px 22px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:18px;}
.sidebar-brand .mark{
  width:42px; height:42px; border-radius:50%; flex-shrink:0; padding:7px;
  background:rgba(255,255,255,.04); border:1px solid rgba(212,177,90,.35);
  display:flex; align-items:center; justify-content:center;
}
.sidebar-brand .mark svg{width:100%; height:100%; color:var(--gold-400);}
.sidebar-brand .name{font-family:var(--font-display); font-size:16.5px; line-height:1.15; color:var(--white);}
.sidebar-brand .tagline{font-size:9.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold-400); font-weight:700;}
.nav-group-label{font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--ink-500); font-weight:700; padding:14px 10px 8px;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:10.5px 12px; border-radius:10px;
  cursor:pointer; font-size:14px; font-weight:600; color:var(--nude-100); margin-bottom:2px;
  transition:.15s; position:relative;
}
.nav-item .ico{width:18px; text-align:center; font-size:15px; opacity:.85;}
.nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.active{background:rgba(212,177,90,.14); color:var(--gold-400);}
.nav-item.active::before{
  content:""; position:absolute; left:-18px; top:8px; bottom:8px; width:3px; border-radius:3px;
  background:linear-gradient(180deg, var(--gold-400), var(--quartz-500));
}
.sidebar-footer{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.08);}
.user-chip{display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px;}
.user-chip .avatar{
  width:34px; height:34px; border-radius:50%; background:var(--quartz-500); color:var(--white);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0;
}
.user-chip .info{font-size:12.5px; line-height:1.3; overflow:hidden;}
.user-chip .info .role{color:var(--gold-400); font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; font-weight:700;}
.logout-btn{
  width:100%; margin-top:10px; background:transparent; border:1px solid rgba(255,255,255,.14);
  color:var(--nude-100); padding:9px; border-radius:9px; font-size:12.5px; font-weight:700; cursor:pointer;
}
.logout-btn:hover{background:rgba(255,255,255,.06); border-color:var(--quartz-500);}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  height:68px; flex-shrink:0; background:var(--white); border-bottom:1px solid var(--nude-200);
  display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:30;
}
.topbar .page-title{font-size:21px;}
.topbar .page-sub{font-size:12px; color:var(--ink-500); margin-top:1px;}
.hamburger{display:none; background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-900); margin-right:12px;}
.topbar-right{display:flex; align-items:center; gap:14px;}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--nude-200); background:var(--white);
  cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; position:relative;
}
.icon-btn:hover{background:var(--nude-100);}
.badge-dot{position:absolute; top:6px; right:7px; width:7px; height:7px; border-radius:50%; background:var(--quartz-700); border:1.5px solid var(--white);}
.content{flex:1; padding:26px 28px 60px; overflow-x:hidden;}
.view{display:none; animation:fadeIn .25s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------------------------------- COMPONENTS ---------------------------------- */
.section-head{display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px;}
.section-head .ribbon{margin-top:8px;}
.card{background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1px solid var(--nude-200);}
.card-pad{padding:20px 22px;}

.kpi-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:16px; margin-bottom:24px;}
.kpi{
  background:var(--white); border-radius:var(--radius); padding:18px 18px 16px; border:1px solid var(--nude-200);
  box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
}
.kpi::after{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--kpi-color, var(--gold-400));}
.kpi .kpi-label{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-500); font-weight:700;}
.kpi .kpi-value{font-family:var(--font-display); font-size:30px; margin-top:6px; color:var(--ink-900);}
.kpi .kpi-note{font-size:11.5px; color:var(--ink-500); margin-top:4px;}

.dash-grid{display:grid; grid-template-columns:1.3fr 1fr; gap:20px;}
@media (max-width:1100px){.dash-grid{grid-template-columns:1fr;} .kpi-grid{grid-template-columns:repeat(2,1fr);}}

.list-row{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px dashed var(--nude-200);}
.list-row:last-child{border-bottom:none;}
.dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
.dot.livre{background:var(--success);} .dot.confirmado{background:var(--info);}
.dot.andamento{background:var(--gold-600);} .dot.finalizado{background:var(--ink-500);} .dot.cancelado{background:var(--danger);}

.toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px;}
.search-box{
  display:flex; align-items:center; gap:8px; background:var(--white); border:1.5px solid var(--nude-200);
  border-radius:10px; padding:9px 13px; flex:1; min-width:200px;
}
.search-box input{border:none; outline:none; background:transparent; font-size:14px; width:100%; font-family:inherit;}
.select-filter{
  padding:9px 12px; border-radius:10px; border:1.5px solid var(--nude-200); background:var(--white);
  font-size:13.5px; font-family:inherit; color:var(--ink-700); cursor:pointer;
}
.btn-gold{
  background:linear-gradient(90deg, var(--gold-600), var(--gold-400)); color:var(--white);
}
.btn-gold:hover{filter:brightness(1.05); box-shadow:var(--shadow-md);}
.btn-outline{background:var(--white); border:1.5px solid var(--nude-200); color:var(--ink-900);}
.btn-outline:hover{border-color:var(--quartz-500); background:var(--nude-100);}
.btn-danger-outline{background:var(--white); border:1.5px solid #EAC9C5; color:var(--danger);}
.btn-danger-outline:hover{background:#FBEAE8;}
.btn-sm{padding:7px 12px; font-size:12.5px; border-radius:8px;}
.btn-icon{width:32px; height:32px; padding:0; border-radius:8px; display:inline-flex; align-items:center; justify-content:center;}

.table-wrap{overflow-x:auto; border-radius:var(--radius); border:1px solid var(--nude-200); background:var(--white);}
table{width:100%; border-collapse:collapse; font-size:13.5px; min-width:640px;}
thead th{
  text-align:left; padding:13px 16px; background:var(--nude-100); color:var(--ink-700);
  font-size:11px; text-transform:uppercase; letter-spacing:.5px; font-weight:700; white-space:nowrap;
  cursor:pointer; user-select:none;
}
thead th:hover{color:var(--gold-600);}
tbody td{padding:12px 16px; border-top:1px solid var(--nude-200); vertical-align:middle;}
tbody tr:hover{background:var(--nude-50);}
.cell-name{font-weight:700; color:var(--ink-900);}
.cell-sub{font-size:11.5px; color:var(--ink-500);}
.avatar-mini{
  width:32px; height:32px; border-radius:50%; background:var(--quartz-300); color:var(--ink-900);
  display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; margin-right:9px;
}
.tag{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}
.tag-vip{background:#F5E6C8; color:var(--gold-800);}
.tag-livre{background:#E4F0E7; color:var(--success);}
.tag-confirmado{background:#E4EBF5; color:var(--info);}
.tag-andamento{background:#F7EAD2; color:var(--gold-800);}
.tag-finalizado{background:var(--nude-100); color:var(--ink-500);}
.tag-cancelado{background:#F8E4E2; color:var(--danger);}
.row-actions{display:flex; gap:6px;}
.pagination{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; font-size:12.5px; color:var(--ink-500);}
.pagination .pages{display:flex; gap:4px;}
.pagination button{
  width:28px; height:28px; border-radius:7px; border:1px solid var(--nude-200); background:var(--white);
  cursor:pointer; font-size:12px; font-weight:700; color:var(--ink-700);
}
.pagination button.active{background:var(--ink-900); color:var(--white); border-color:var(--ink-900);}
.empty-state{padding:50px 20px; text-align:center; color:var(--ink-500);}
.empty-state .ico{font-size:34px; margin-bottom:10px;}

/* Agenda */
.agenda-toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px;}
.agenda-view-toggle{display:flex; background:var(--nude-100); border-radius:10px; padding:3px;}
.agenda-view-toggle button{
  border:none; background:transparent; padding:7px 14px; border-radius:8px; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--ink-700);
}
.agenda-view-toggle button.active{background:var(--white); box-shadow:var(--shadow-sm); color:var(--ink-900);}
.legend{display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-700); margin-bottom:14px;}
.legend span{display:flex; align-items:center; gap:6px;}
.agenda-day{display:flex; flex-direction:column; gap:8px;}
.slot{
  display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:10px; cursor:pointer;
  border-left:4px solid; transition:.15s;
}
.slot:hover{transform:translateX(2px); box-shadow:var(--shadow-sm);}
.slot.livre{background:#F1F8F3; border-color:var(--success);}
.slot.confirmado{background:#EEF3FA; border-color:var(--info);}
.slot.andamento{background:#FBF3E0; border-color:var(--gold-600);}
.slot.finalizado{background:var(--nude-100); border-color:var(--ink-500);}
.slot.cancelado{background:#FBEAE8; border-color:var(--danger);}
.slot .time{font-weight:800; font-size:13.5px; width:52px; flex-shrink:0;}
.slot .info{flex:1; min-width:0;}
.slot .info .cli{font-weight:700; font-size:13.5px;}
.slot .info .meta{font-size:11.5px; color:var(--ink-500);}
.week-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:10px;}
.week-col{background:var(--white); border-radius:10px; border:1px solid var(--nude-200); padding:10px; min-height:220px;}
.week-col .wd{font-size:11px; text-transform:uppercase; font-weight:800; color:var(--ink-500); text-align:center; margin-bottom:8px;}
.week-slot{font-size:10.5px; padding:5px 6px; border-radius:6px; margin-bottom:5px; border-left:3px solid;}

/* Estoque/produtos low bar */
.stock-bar{width:100%; height:6px; border-radius:4px; background:var(--nude-200); overflow:hidden; margin-top:5px;}
.stock-bar > div{height:100%; border-radius:4px;}

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(36,30,28,.5); display:flex; align-items:center; justify-content:center;
  z-index:100; padding:20px; backdrop-filter:blur(2px);
}
.modal{
  background:var(--white); border-radius:16px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
  box-shadow:var(--shadow-lg); animation:pop .18s ease;
}
@keyframes pop{from{transform:scale(.96); opacity:0;} to{transform:scale(1); opacity:1;}}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--nude-200);}
.modal-head h3{font-size:20px;}
.modal-close{background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-500); width:32px; height:32px; border-radius:8px;}
.modal-close:hover{background:var(--nude-100);}
.modal-body{padding:22px 24px;}
.modal-foot{display:flex; justify-content:flex-end; gap:10px; padding:16px 24px; border-top:1px solid var(--nude-200);}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 16px;}
.form-grid .full{grid-column:1/-1;}
@media (max-width:520px){.form-grid{grid-template-columns:1fr;}}

/* Toasts + Loader */
#toast-container{position:fixed; bottom:22px; right:22px; z-index:200; display:flex; flex-direction:column; gap:10px;}
.toast{
  background:var(--ink-900); color:var(--white); padding:13px 18px; border-radius:10px; font-size:13.5px;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; min-width:240px; animation:slideIn .25s ease;
  border-left:4px solid var(--gold-400);
}
.toast.success{border-color:var(--success);} .toast.error{border-color:var(--danger);}
@keyframes slideIn{from{transform:translateX(30px); opacity:0;} to{transform:translateX(0); opacity:1;}}
#loader-overlay{
  position:fixed; inset:0; background:rgba(251,247,242,.7); z-index:300; display:none; align-items:center; justify-content:center;
}
.spinner{width:44px; height:44px; border-radius:50%; border:3px solid var(--nude-200); border-top-color:var(--gold-600); animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Sidebar mobile */
.sidebar-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:39;}
@media (max-width:900px){
  .sidebar{position:fixed; left:-280px; top:0; transition:left .2s ease;}
  .sidebar.open{left:0;}
  .sidebar-overlay.show{display:block;}
  .hamburger{display:block;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .content{padding:18px;}
  .topbar{padding:0 16px;}
  .week-grid{grid-template-columns:repeat(3,1fr);}
}
@media (max-width:520px){
  .kpi-grid{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
  .week-grid{grid-template-columns:repeat(2,1fr);}
}
.helper-text{font-size:11px; color:var(--ink-500); margin-top:4px;}
.profile-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;}
.prof-card{background:var(--white); border:1px solid var(--nude-200); border-radius:var(--radius); padding:18px; text-align:center; box-shadow:var(--shadow-sm);}
.prof-card .avatar-lg{
  width:64px; height:64px; border-radius:50%; margin:0 auto 10px; background:linear-gradient(150deg,var(--quartz-300),var(--gold-400));
  display:flex; align-items:center; justify-content:center; color:var(--white); font-weight:800; font-size:22px;
}
.prof-card h4{font-size:16px;}
.prof-card .spec{font-size:12px; color:var(--ink-500); margin:2px 0 10px;}
.prof-card .stats{display:flex; justify-content:space-around; font-size:11.5px; color:var(--ink-700); border-top:1px dashed var(--nude-200); padding-top:10px; margin-top:6px;}
.prof-card .stats b{display:block; font-family:var(--font-display); font-size:15px; color:var(--ink-900);}
.tabs{display:flex; gap:4px; background:var(--nude-100); border-radius:10px; padding:3px; margin-bottom:18px; width:fit-content; flex-wrap:wrap;}

/* ==========================================================================
   SANDRA JÚLIA ERP — APPLICATION SCRIPT
   Sections:
     1. API LAYER (Google Apps Script bridge + local demo fallback)
     2. STATE & AUTH
     3. NAVIGATION / MENU BY PROFILE
     4. UTIL (masks, toasts, loader, modal helpers, table helpers)
     5. VIEW RENDERERS (Dashboard, Agenda, Clientes, Profissionais, Serviços,

   ========================================================================== */

/* --------------------------------------------------------------------------
   1. API LAYER
   Every data operation goes through `api(action, payload)`. It calls the
   Apps Script Web App (deployed as a JSON API — see APPS_SCRIPT_URL below)
   via fetch(), e.g. action "listarClientes" -> Code.gs function listarClientes().
   This intentionally does NOT use google.script.run: that requires the page
   to be served BY Apps Script's HtmlService, which triggers an in-browser
   OAuth consent iframe that can break in some browsers/accounts. fetch()
   avoids that entirely — this file can run as a local file or be hosted
   anywhere, and simply talks to the Apps Script URL over plain HTTP.
   With no APPS_SCRIPT_URL configured, it falls back to an in-memory demo
   dataset so the interface can be reviewed without a live backend.
-------------------------------------------------------------------------- */
// Rede de segurança: qualquer erro não tratado aparece na tela (e no console)
// em vez de deixar a aplicação em branco silenciosamente.
window.addEventListener('error', function(e){
  console.error('Erro não tratado:', e.error || e.message);
  const content = document.getElementById('content');
  const app = document.getElementById('app');
  if(content && app && !app.classList.contains('hidden')){
    content.innerHTML = `<div class="empty-state"><div class="ico">⚠</div>Ocorreu um erro inesperado: `
      + `${(e.error&&e.error.message)||e.message||'ver console (F12) para detalhes'}</div>`;
  }
});

// Emblema da marca — lótus minimalista em traço único, inspirado na identidade
// visual do salão (SPA Sandra Julia), redesenhado em SVG para reaproveitar as
// cores do sistema (dourado/nude) em qualquer fundo, claro ou escuro.
const LOGO_SVG = `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">

</svg>`;

/* --------------------------------------------------------------------------
   CONFIGURAÇÃO DA API
   Cole aqui a URL do seu Apps Script implantado como "App da Web" (termina em
   /exec). Enquanto estiver com o valor padrão abaixo, o sistema roda em modo
   demonstração, usando dados fictícios em memória — útil para conferir a
   interface antes de ligar ao backend real.

   Por que fetch() e não google.script.run? Porque google.script.run só
   funciona quando a própria página é servida pelo Apps Script (HtmlService),
   o que nesse caso tem gerado uma tela de autorização quebrada em alguns
   navegadores/contas. Com fetch(), o index.html roda fora do Apps Script
   (local ou hospedado em qualquer lugar) e conversa com o backend por uma
   chamada HTTP comum — sem qualquer tela de login/consentimento no meio.
-------------------------------------------------------------------------- */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdahgE00oDzfved_T4AlYT2x7Xww8fp1zwkbMaNRnFJOOmh7vlE_l_-BfxqGZaJZTn4w/exec'; // ex.: https://script.google.com/macros/s/AKfycb.../exec
// URL pública onde o anamnese.html está hospedado (mesmo lugar do index.html),
// usada para montar o link enviado ao cliente pelo WhatsApp.
const ANAMNESE_FORM_URL = 'https://jeanpires-pixel.github.io/sj-connect/anamnese.html'; // ex.: https://seusite.netlify.app/anamnese.html
const USE_REMOTE_API = /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(APPS_SCRIPT_URL);

function api(action, payload){
  if(USE_REMOTE_API){
    // Envia como text/plain para evitar o preflight OPTIONS do CORS, que o
    // Apps Script Web App não responde. O corpo continua sendo um JSON válido;
    // só o content-type da requisição é "simples" aos olhos do navegador.
    return fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action, payload})
    })
    .then(r=>{
      if(!r.ok) throw new Error('Falha de rede ao contatar a API (HTTP '+r.status+').');
      return r.json();
    })
    .then(json=>{
      if(!json.ok) throw new Error(json.error || 'Erro desconhecido retornado pela API.');
      return json.data;
    });
  }
  // ---- MODO DEMONSTRAÇÃO (sem APPS_SCRIPT_URL configurada) ----
  return new Promise((resolve, reject)=>{
    setTimeout(()=>{
      try{ resolve(demoAPI(action, payload)); }catch(e){ reject(e); }
    }, 180 + Math.random()*220);
  });
}

function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }

function demoAPI(action, payload){
  seedDB();
  const clone = o => JSON.parse(JSON.stringify(o));
  switch(action){
    case 'autenticar': {
      const u = DB.usuarios.find(x=>x.usuario===payload.usuario && x.senha===payload.senha && x.ativo);
      if(!u) throw new Error('Credenciais inválidas');
      return clone(u);
    }
    case 'listarClientes': return clone(DB.clientes);
    case 'salvarCliente': {
      if(payload.id){ const i=DB.clientes.findIndex(c=>c.id===payload.id); DB.clientes[i]=payload; }
      else { payload.id = uid('c'); DB.clientes.push(payload); }
      return clone(payload);
    }
    case 'excluirCliente': DB.clientes = DB.clientes.filter(c=>c.id!==payload.id); return {ok:true};

    case 'listarProfissionais': return clone(DB.profissionais);
    case 'salvarProfissional': {
      if(payload.id){ const i=DB.profissionais.findIndex(c=>c.id===payload.id); DB.profissionais[i]=payload; }
      else { payload.id = uid('p'); payload.atendimentosMes = 0; DB.profissionais.push(payload); }
      return clone(payload);
    }
    case 'excluirProfissional': DB.profissionais = DB.profissionais.filter(c=>c.id!==payload.id); return {ok:true};

    case 'listarServicos': return clone(DB.servicos);
    case 'salvarServico': {
      if(payload.id){ const i=DB.servicos.findIndex(c=>c.id===payload.id); DB.servicos[i]=payload; }
      else { payload.id = uid('s'); DB.servicos.push(payload); }
      return clone(payload);
    }
    case 'excluirServico': DB.servicos = DB.servicos.filter(c=>c.id!==payload.id); return {ok:true};

    case 'listarProdutos': return clone(DB.produtos);
    case 'salvarProduto': {
      if(payload.id){ const i=DB.produtos.findIndex(c=>c.id===payload.id); DB.produtos[i]=payload; }
      else { payload.id = uid('pr'); DB.produtos.push(payload); }
      return clone(payload);
    }
    case 'excluirProduto': DB.produtos = DB.produtos.filter(c=>c.id!==payload.id); return {ok:true};

    case 'listarFornecedores': return clone(DB.fornecedores);
    case 'salvarFornecedor': {
      if(payload.id){ const i=DB.fornecedores.findIndex(c=>c.id===payload.id); DB.fornecedores[i]=payload; }
      else { payload.id = uid('f'); DB.fornecedores.push(payload); }
      return clone(payload);
    }
    case 'excluirFornecedor': DB.fornecedores = DB.fornecedores.filter(c=>c.id!==payload.id); return {ok:true};

    case 'listarAgenda': return clone(DB.agenda);
    case 'salvarAgendamento': {
      if(payload.id){ const i=DB.agenda.findIndex(c=>c.id===payload.id); DB.agenda[i]=payload; }
      else { payload.id = uid('a'); DB.agenda.push(payload); }
      return clone(payload);
    }
    case 'excluirAgendamento': DB.agenda = DB.agenda.filter(c=>c.id!==payload.id); return {ok:true};

    case 'listarFinanceiro': return clone(DB.financeiro);
    case 'salvarLancamentoFinanceiro': {
      payload.id = uid('fi'); DB.financeiro.push(payload); return clone(payload);
    }

    case 'listarRecibos': return clone(DB.recibos);
    case 'salvarRecibo': { payload.id = uid('rc'); DB.recibos.push(payload); return clone(payload); }

    case 'listarMovimentacoesEstoque': return clone(DB.movimentacoes);
    case 'registrarMovimentacaoEstoque': {
      const prod = DB.produtos.find(p=>p.id===payload.produtoId);
      if(!prod) throw new Error('Produto não encontrado.');
      prod.estoque = payload.tipo==='entrada' ? prod.estoque + payload.quantidade : prod.estoque - payload.quantidade;
      payload.id = uid('mv');
      DB.movimentacoes.push(payload);
      return {ok:true, produto:clone(prod)};
    }

    case 'obterClienteParaAnamnese': {
      const c = DB.clientes.find(x=>x.id===payload.id);
      if(!c) throw new Error('Cliente não encontrado.');
      return {id:c.id, nome:c.nome};
    }
    case 'salvarAnamnese': { payload.id = uid('an'); DB.anamneses.push(payload); return clone(payload); }
    case 'listarAnamneses': return clone(DB.anamneses);

    case 'listarUsuarios': return clone(DB.usuarios);
    case 'salvarUsuario': {
      if(payload.id){ const i=DB.usuarios.findIndex(c=>c.id===payload.id); DB.usuarios[i]=payload; }
      else { payload.id = uid('u'); DB.usuarios.push(payload); }
      return clone(payload);
    }
    case 'excluirUsuario': DB.usuarios = DB.usuarios.filter(c=>c.id!==payload.id); return {ok:true};

    case 'obterDashboard': {
      const hojeStr = iso_(new Date());
      const ag = DB.agenda.filter(a=>a.data===hojeStr);
      const faturamentoHoje = DB.financeiro.filter(f=>f.data===hojeStr && f.tipo==='entrada').reduce((s,f)=>s+f.valor,0);
      const baixos = DB.produtos.filter(p=>p.estoque<=p.minimo).length;
      const mmdd = d => d.slice(5);
      const hojeMD = mmdd(hojeStr);
      const aniversariantes = DB.clientes.filter(c=>c.aniversario===hojeMD || Math.abs(diffDay(c.aniversario,hojeMD))<=3);
      return { agendamentosHoje: ag.length, clientesHoje: new Set(ag.map(a=>a.clienteId)).size,
        aniversariantes: aniversariantes.length, faturamentoHoje, produtosBaixos: baixos, agendaHoje: clone(ag) };
    }
    default: throw new Error('Ação desconhecida: '+action);
  }
}
function iso_(d){ return d.toISOString().slice(0,10); }
function diffDay(a,b){ return 999; }

/* --------------------------------------------------------------------------
   2. STATE & AUTH
-------------------------------------------------------------------------- */
const STATE = {
  user:null,
  currentView:'dashboard',
  cache:{ clientes:[], profissionais:[], servicos:[], produtos:[], fornecedores:[], agenda:[], usuarios:[], financeiro:[] },
  table:{ // per-table UI state: search, sort, page
  }
};

function tableState(name){
  if(!STATE.table[name]) STATE.table[name] = {search:'', sortKey:null, sortDir:1, page:1, pageSize:6, filter:''};
  return STATE.table[name];
}

async function handleLogin(e){
  e.preventDefault();
  const usuario = document.getElementById('login-user').value.trim();
  const senha = document.getElementById('login-pass').value;
  const errBox = document.getElementById('login-error');
  errBox.style.display='none';
  showLoader(true);
  try{
    const user = await api('autenticar', {usuario, senha});
    STATE.user = user;
    showLoader(false);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    bootApp();
  }catch(err){
    showLoader(false);
    errBox.textContent = 'Usuário ou senha inválidos.';
    errBox.style.display='block';
  }
  return false;
}
function handleLogout(){
  STATE.user = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-form').reset();
}

// Aceita variações de acentuação/maiúsculas vindas da planilha (ex.: "administrador",
// "ADMINISTRADOR ", "Administrador") e sempre resolve para uma das 3 chaves de MENUS.
function normalizePerfil(raw){
  const s = String(raw||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,''); // remove acentos
  if(s.startsWith('admin')) return 'Administrador';
  if(s.startsWith('recep')) return 'Recepcionista';
  if(s.startsWith('profis')) return 'Profissional';
  return null;
}

function bootApp(){
  try{
    const perfil = normalizePerfil(STATE.user.perfil);
    if(!perfil){
      throw new Error('Perfil de usuário "'+STATE.user.perfil+'" não reconhecido. '+
        'Use exatamente Administrador, Recepcionista ou Profissional na coluna "perfil" da aba Usuarios.');
    }
    STATE.user.perfil = perfil;
    document.getElementById('user-name').textContent = STATE.user.nome || '—';
    document.getElementById('user-role').textContent = perfil;
    document.getElementById('user-avatar').textContent = initials(STATE.user.nome || '?');
    renderMenu();
    const firstItem = MENUS[perfil][0];
    navigate(firstItem.view);
  }catch(err){
    console.error('Erro ao iniciar o sistema:', err);
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="ico">⚠</div>${escapeHtml(err.message||String(err))}</div>`;
    document.getElementById('nav-menu').innerHTML = '';
  }
}
function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function renderMenu(){
  const nav = document.getElementById('nav-menu');
  const items = MENUS[STATE.user.perfil] || [];
  nav.innerHTML = items.map(it=>`
    <div class="nav-item" data-view="${it.view}" onclick="navigate('${it.view}')">
      <span class="ico">${it.ico}</span><span>${it.label}</span>
    </div>`).join('');
}
function setActiveNav(view){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view===view);
  });
}
async function navigate(view){
  STATE.currentView = view;
  setActiveNav(view);
  const meta = PAGE_META[view] || [view,''];
  document.getElementById('page-title').textContent = meta[0];
  document.getElementById('page-sub').textContent = meta[1];
  toggleSidebar(false);
  const content = document.getElementById('content');
  content.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>`;
  try{
    const html = await RENDERERS[view]();
    content.innerHTML = html;
    if(POST_RENDER[view]) POST_RENDER[view]();
  }catch(err){
    content.innerHTML = `<div class="empty-state">Erro ao carregar: ${escapeHtml(err.message||String(err))}</div>`;
  }
}

function toggleSidebar(open){
  document.getElementById('sidebar').classList.toggle('open', !!open);
  document.getElementById('sidebar-overlay').classList.toggle('show', !!open);
}

function showLoader(v){ document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }
function toast(msg, type='info'){
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span><span>${escapeHtml(msg)}</span>`;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); }, 3200);
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmtMoney(v){ return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function maskCPF(v){
  return v.replace(/\D/g,'').slice(0,11)
    .replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
}
function maskPhone(v){
  v = v.replace(/\D/g,'').slice(0,11);
  if(v.length>10) return v.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  return v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
}
function attachMasks(root){
  root.querySelectorAll('[data-mask="cpf"]').forEach(inp=>inp.addEventListener('input',()=>inp.value=maskCPF(inp.value)));
  root.querySelectorAll('[data-mask="phone"]').forEach(inp=>inp.addEventListener('input',()=>inp.value=maskPhone(inp.value)));
}
function openModal(html){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='active-modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
  attachMasks(overlay);
  return overlay;
}
function closeModal(){ const el=document.getElementById('active-modal-overlay'); if(el) el.remove(); }

/* Generic sortable/searchable table controller.
   config = { data, columns:[{key,label,render?}], searchKeys:[...], onSearch, rowActions(row) } */
function applyTableControls(name, rawData, opts){
  const st = tableState(name);
  let data = rawData.slice();
  if(opts.customFilter) data = opts.customFilter(data, st);
  if(st.search && opts.searchKeys){
    const q = st.search.toLowerCase();
    data = data.filter(row => opts.searchKeys.some(k => String(row[k]||'').toLowerCase().includes(q)));
  }
  if(st.sortKey){
    data.sort((a,b)=>{
      const av=a[st.sortKey], bv=b[st.sortKey];
      if(typeof av==='number') return (av-bv)*st.sortDir;
      return String(av||'').localeCompare(String(bv||''))*st.sortDir;
    });
  }
  const total = data.length;
  const pages = Math.max(1, Math.ceil(total/st.pageSize));
  st.page = Math.min(st.page, pages);
  const start = (st.page-1)*st.pageSize;
  const pageData = data.slice(start, start+st.pageSize);
  return {pageData, total, pages};
}
function paginationHtml(name, total, pages){
  const st = tableState(name);
  let btns='';
  for(let i=1;i<=pages;i++){
    btns += `<button class="${i===st.page?'active':''}" onclick="gotoPage('${name}',${i})">${i}</button>`;
  }
  return `<div class="pagination">
    <span>${total} registro${total===1?'':'s'}</span>
    <div class="pages">${btns}</div>
  </div>`;
}
function gotoPage(name, page){ tableState(name).page = page; navigate(STATE.currentView); }
function sortTable(name, key){
  const st = tableState(name);
  if(st.sortKey===key) st.sortDir *= -1; else { st.sortKey=key; st.sortDir=1; }
  navigate(STATE.currentView);
}
function searchTable(name, val){ tableState(name).search = val; tableState(name).page=1; navigate(STATE.currentView); }
function filterTable(name, val){ tableState(name).filter = val; tableState(name).page=1; navigate(STATE.currentView); }

/* ---------- AGENDA (shared by Administrador/Recepcionista "agenda",
   and Profissional "minhaagenda" / "agendasemanal") ---------- */
async function loadAgendaContext(){
  const [agenda, profs, servicos, clientes] = await Promise.all([
    api('listarAgenda'), api('listarProfissionais'), api('listarServicos'), api('listarClientes')
  ]);
  return {agenda, profs, servicos, clientes};
}
const STATUS_LIST = ['livre','confirmado','andamento','finalizado','cancelado'];
const STATUS_LABEL = {livre:'Livre', confirmado:'Confirmado', andamento:'Em Atendimento', finalizado:'Finalizado', cancelado:'Cancelado'};
// Profissionais com estas especialidades têm o horário travado: não é possível
// marcar dois atendimentos no mesmo horário para a mesma pessoa. Os demais
// profissionais não sofrem esse bloqueio e podem atender mais de um serviço
// no mesmo horário (ex.: cliente em coloração enquanto outra recebe make).
const ESPECIALIDADES_COM_BLOQUEIO = ['manicure', 'pedicure', 'nail design'];
function especialidadeTemBloqueio(especialidade){
  const s = String(especialidade||'').toLowerCase();
  return ESPECIALIDADES_COM_BLOQUEIO.some(e => s.includes(e));
}
function horaParaMinutos(hora){ const [h,m] = String(hora).split(':').map(Number); return h*60+(m||0); }
// Verifica se um novo agendamento colide com outro já existente para o mesmo
// profissional/data, considerando início e duração. excludeId ignora o próprio
// registro quando estamos editando um agendamento existente.
function encontrarConflitoAgenda(agendaList, profissionalId, data, hora, duracao, excludeId){
  const inicio = horaParaMinutos(hora), fim = inicio + Number(duracao||0);
  return agendaList.find(a=>{
    if(a.id===excludeId) return false;
    if(a.profissionalId!==profissionalId || a.data!==data) return false;
    if(a.status==='cancelado') return false;
    const aInicio = horaParaMinutos(a.hora), aFim = aInicio + Number(a.duracao||0);
    return inicio < aFim && aInicio < fim;
  });
}

async function saveAgenda(id){
  const payload = {
    id: id||undefined,
    clienteId: document.getElementById('ag-cliente').value,
    servicoId: document.getElementById('ag-servico').value,
    profissionalId: document.getElementById('ag-profissional').value,
    data: document.getElementById('ag-data').value,
    hora: document.getElementById('ag-hora').value,
    duracao: Number(document.getElementById('ag-duracao').value),
    valor: Number(document.getElementById('ag-valor').value),
    status: document.getElementById('ag-status').value,
    obs: document.getElementById('ag-obs').value,
  };
  const [profs, agendaAtual] = await Promise.all([api('listarProfissionais'), api('listarAgenda')]);
  const prof = profs.find(p=>p.id===payload.profissionalId);
  if(prof && especialidadeTemBloqueio(prof.especialidade)){
    const conflito = encontrarConflitoAgenda(agendaAtual, payload.profissionalId, payload.data, payload.hora, payload.duracao, id);
    if(conflito){
      toast(`Horário indisponível: ${prof.nome} já tem um atendimento marcado nesse período.`,'error');
      return;
    }
  }
  showLoader(true);
  try{ await api('salvarAgendamento', payload); showLoader(false); closeModal(); toast('Agendamento salvo com sucesso.','success'); navigate('agenda'); }
  catch(e){ showLoader(false); toast('Erro ao salvar agendamento.','error'); }

async function sendAnamnese(id){
  const isConfigured = /^https?:\/\/.+/.test(ANAMNESE_FORM_URL) && !ANAMNESE_FORM_URL.startsWith('COLE_AQUI');
  if(!isConfigured){
    toast('Configure a constante ANAMNESE_FORM_URL no topo do index.html com o link do anamnese.html publicado.','error');
    return;
  }
  // Abre a aba em branco IMEDIATAMENTE (ainda de forma síncrona ao clique), antes
  // de qualquer await — navegadores bloqueiam window.open() como pop-up quando ele
  // acontece depois de uma operação assíncrona (ex.: aguardar a API responder).
  const janela = window.open('', '_blank');
  const c = (await api('listarClientes')).find(x=>x.id===id);
  if(!c){ if(janela) janela.close(); toast('Cliente não encontrado.','error'); return; }
  const phone = (c.telefone||'').replace(/\D/g,'');
  if(!phone){ if(janela) janela.close(); toast('Este cliente não tem telefone cadastrado — edite o cliente e adicione o telefone.','error'); return; }
  const link = `${ANAMNESE_FORM_URL}?cliente=${encodeURIComponent(id)}`;
  const mensagem = `Olá, ${c.nome}! Antes do seu atendimento na Sandra Júlia, por favor preencha sua ficha de anamnese pelo link: ${link}`;
  const url = `https://wa.me/55${phone}?text=${encodeURIComponent(mensagem)}`;
  if(janela) janela.location.href = url; else window.open(url,'_blank');
  toast('WhatsApp aberto com o link da ficha de anamnese.','success');
}

function reciboRecalcRow(i){
  const servSel = document.querySelector(`.rc-servico[data-row="${i}"]`);
  const atdSel = document.querySelector(`.rc-atendente[data-row="${i}"]`);
  const valorInp = document.querySelector(`.rc-valor[data-row="${i}"]`);
  const comInp = document.querySelector(`.rc-comissao[data-row="${i}"]`);
  const preco = servSel.selectedOptions[0]?.dataset.preco;
  const comissaoPct = atdSel.selectedOptions[0]?.dataset.comissao;
  if(preco && !valorInp.value) valorInp.value = Number(preco).toFixed(2);
  if(comissaoPct && valorInp.value) comInp.value = (Number(valorInp.value) * Number(comissaoPct) / 100).toFixed(2);
  reciboRecalcTotal();
}
function reciboRecalcTotal(){
  let total = 0;
  document.querySelectorAll('.rc-valor').forEach(inp=> total += Number(inp.value||0));
  total += Number(document.getElementById('rc-cafe').value||0);
  total += Number(document.getElementById('rc-produtos').value||0);
  total -= Number(document.getElementById('rc-credito').value||0);
  document.getElementById('rc-total').textContent = fmtMoney(total);
}
async function saveRecibo(){
  const [profs, servicos] = await Promise.all([api('listarProfissionais'), api('listarServicos')]);
  const itens = [];
  for(let i=0;i<5;i++){
    const atd = document.querySelector(`.rc-atendente[data-row="${i}"]`);
    const srv = document.querySelector(`.rc-servico[data-row="${i}"]`);
    const com = document.querySelector(`.rc-comissao[data-row="${i}"]`);
    const val = document.querySelector(`.rc-valor[data-row="${i}"]`);
    if(atd.value || srv.value || val.value){
      itens.push({
        atendente: atd.selectedOptions[0]?.textContent || '',
        servico: srv.selectedOptions[0]?.textContent || '',
        comissao: Number(com.value||0),
        valor: Number(val.value||0),
      });
    }
  }
  const cafe = Number(document.getElementById('rc-cafe').value||0);
  const produtos = Number(document.getElementById('rc-produtos').value||0);
  const credito = Number(document.getElementById('rc-credito').value||0);
  const totalRecebido = itens.reduce((s,i)=>s+i.valor,0) + cafe + produtos - credito;
  const payload = {
    data: new Date().toISOString().slice(0,10),
    clienteNome: document.getElementById('rc-cliente').value.trim(),
    telefone: document.getElementById('rc-telefone').value,
    aniversario: document.getElementById('rc-aniversario').value,
    instagram: document.getElementById('rc-instagram').value,
    cpf: document.getElementById('rc-cpf').value,
    itens: JSON.stringify(itens),
    cafeConsumo: cafe, produtosVendas: produtos, credito, totalRecebido,
  };
  showLoader(true);
  try{
    const saved = await api('salvarRecibo', payload);
    showLoader(false); closeModal(); toast('Recibo salvo com sucesso.','success');
    navigate('recibos');
    printRecibo(null, saved);
  }catch(e){ showLoader(false); toast('Erro ao salvar recibo.','error'); }
}

RENDERERS.financeiro = async function(){
  const st = tableState('financeiro');
  if(!st.periodo) st.periodo='diario';
  const lanc = await api('listarFinanceiro');
  const todayISO = new Date().toISOString().slice(0,10);
  const mesAtual = todayISO.slice(0,7);
  const semanaAtras = new Date(); semanaAtras.setDate(semanaAtras.getDate()-6);
  const semanaAtrasISO = semanaAtras.toISOString().slice(0,10);
  const filtered = st.periodo==='diario' ? lanc.filter(f=>f.data===todayISO)
    : st.periodo==='semanal' ? lanc.filter(f=>f.data>=semanaAtrasISO && f.data<=todayISO)
    : lanc.filter(f=>f.data.startsWith(mesAtual));
  const entradas = filtered.filter(f=>f.tipo==='entrada').reduce((s,f)=>s+f.valor,0);
  const saidas = filtered.filter(f=>f.tipo==='saida').reduce((s,f)=>s+f.valor,0);
  const porForma = {};
  filtered.filter(f=>f.tipo==='entrada').forEach(f=>{ porForma[f.forma]=(porForma[f.forma]||0)+f.valor; });
  const formaLabel={pix:'Pix',debito:'Débito',credito:'Crédito',dinheiro:'Dinheiro'};
  return `
    <div class="tabs">
      <button class="${st.periodo==='diario'?'active':''}" onclick="setFinPeriodo('diario')">Fluxo Diário</button>
      <button class="${st.periodo==='semanal'?'active':''}" onclick="setFinPeriodo('semanal')">Fluxo Semanal</button>
      <button class="${st.periodo==='mensal'?'active':''}" onclick="setFinPeriodo('mensal')">Fluxo Mensal</button>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
      <div class="kpi" style="--kpi-color:var(--success)"><div class="kpi-label">Entradas</div><div class="kpi-value">${fmtMoney(entradas)}</div></div>
      <div class="kpi" style="--kpi-color:var(--danger)"><div class="kpi-label">Saídas</div><div class="kpi-value">${fmtMoney(saidas)}</div></div>
      <div class="kpi" style="--kpi-color:var(--gold-600)"><div class="kpi-label">Saldo</div><div class="kpi-value">${fmtMoney(entradas-saidas)}</div></div>
    </div>
    <div class="dash-grid">
      <div class="card card-pad">
        <div class="section-head"><div><h3>Lançamentos</h3><div class="ribbon"></div></div>
          <button class="btn btn-gold btn-sm" onclick="openLancamentoModal()">+ Receber / Lançar</button>
        </div>
        ${filtered.length?filtered.sort((a,b)=>b.data.localeCompare(a.data)).map(f=>`
          <div class="list-row"><span class="dot ${f.tipo==='entrada'?'livre':'cancelado'}"></span>
            <div style="flex:1;"><div style="font-weight:700;font-size:13.5px;">${f.descricao}</div>
            <div class="cell-sub">${fmtDate(f.data)} · ${formaLabel[f.forma]||f.forma}</div></div>
            <div style="font-weight:800;color:${f.tipo==='entrada'?'var(--success)':'var(--danger)'};">${f.tipo==='entrada'?'+':'-'} ${fmtMoney(f.valor)}</div>
          </div>`).join(''):`<div class="empty-state">Nenhum lançamento no período.</div>`}
      </div>
      <div class="card card-pad">
        <div class="section-head"><div><h3>Por Forma de Pagamento</h3><div class="ribbon"></div></div></div>
        ${Object.keys(porForma).length? Object.entries(porForma).map(([k,v])=>`<span class="chip-payment">${formaLabel[k]||k}: ${fmtMoney(v)}</span>`).join(''):'<div class="empty-state">Sem entradas no período.</div>'}
      </div>
    </div>`;
};
function setFinPeriodo(p){ tableState('financeiro').periodo=p; navigate('financeiro'); }
async function openLancamentoModal(){
  openModal(`<div class="modal-head"><h3>Novo Lançamento</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="field"><label>Tipo</label><select id="fi-tipo"><option value="entrada">Entrada (Receber)</option><option value="saida">Saída</option></select></div>
      <div class="field"><label>Forma</label><select id="fi-forma">
        <option value="pix">Pix</option><option value="debito">Débito</option><option value="credito">Crédito</option><option value="dinheiro">Dinheiro</option>
      </select></div>
      <div class="field"><label>Valor (R$)</label><input id="fi-valor" type="number" step="0.01"></div>
      <div class="field"><label>Desconto (R$)</label><input id="fi-desconto" type="number" step="0.01" value="0"></div>
      <div class="field full"><label>Descrição</label><input id="fi-descricao" placeholder="Ex: Corte - Nome do Cliente"></div>
    </div></div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="saveLancamento()">Salvar</button></div>`);
}
async function saveLancamento(){
  const valor = Number(document.getElementById('fi-valor').value) - Number(document.getElementById('fi-desconto').value||0);
  const payload = {tipo:document.getElementById('fi-tipo').value, forma:document.getElementById('fi-forma').value,
    valor, descricao:document.getElementById('fi-descricao').value||'Lançamento manual', data:new Date().toISOString().slice(0,10)};
  showLoader(true);
  try{ await api('salvarLancamentoFinanceiro',payload); showLoader(false); closeModal(); toast('Lançamento registrado.','success'); navigate('financeiro'); }
  catch(e){ showLoader(false); toast('Erro ao registrar.','error'); }
}

/* ---------- RELATÓRIOS ---------- */
RENDERERS.relatorios = async function(){
  const st = tableState('relatorios'); if(!st.tab) st.tab='clientesFrequentes';
  const [clientes, profs, servicos, agenda, financeiro] = await Promise.all([
    api('listarClientes'), api('listarProfissionais'), api('listarServicos'), api('listarAgenda'), api('listarFinanceiro')
  ]);
  const tabs = [
    ['clientesFrequentes','Clientes Frequentes'], ['aniversariantes','Aniversariantes'],
    ['servicosMaisVendidos','Serviços Mais Vendidos'], ['profissionalProdutivo','Profissional Mais Produtivo'],
    ['produtosUtilizados','Produtos Mais Utilizados'], ['faturamento','Faturamento'],
  ];
  const countBy = (arr,key)=>{ const m={}; arr.forEach(x=>{ m[x[key]]=(m[x[key]]||0)+1; }); return m; };
  const nomeCli = id=>(clientes.find(c=>c.id===id)||{}).nome||'—';
  const nomeProf = id=>(profs.find(p=>p.id===id)||{}).nome||'—';
  const nomeServ = id=>(servicos.find(s=>s.id===id)||{}).nome||'—';

  let body='';
  if(st.tab==='clientesFrequentes'){
    const m = countBy(agenda,'clienteId');
    const rows = Object.entries(m).map(([id,c])=>({label:nomeCli(id), value:c})).sort((a,b)=>b.value-a.value);
    body = barList(rows,'atend.');
  } else if(st.tab==='aniversariantes'){
    body = `<div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Data</th></tr></thead><tbody>
      ${clientes.map(c=>`<tr><td class="cell-name">${c.nome}</td><td>${c.aniversario}</td></tr>`).join('')}
      </tbody></table></div>`;
  } else if(st.tab==='servicosMaisVendidos'){
    const m = countBy(agenda,'servicoId');
    const rows = Object.entries(m).map(([id,c])=>({label:nomeServ(id), value:c})).sort((a,b)=>b.value-a.value);
    body = barList(rows,'vendas');
  } else if(st.tab==='profissionalProdutivo'){
    const m = countBy(agenda,'profissionalId');
    const rows = Object.entries(m).map(([id,c])=>({label:nomeProf(id), value:c})).sort((a,b)=>b.value-a.value);
    body = barList(rows,'atend.');
  } else if(st.tab==='produtosUtilizados'){
    const produtos = await api('listarProdutos');
    const rows = produtos.map(p=>({label:p.nome, value:p.minimo*3-p.estoque>0?p.minimo*3-p.estoque:1})).sort((a,b)=>b.value-a.value);
    body = barList(rows,'uso');
  } else if(st.tab==='faturamento'){
    const total = financeiro.filter(f=>f.tipo==='entrada').reduce((s,f)=>s+f.valor,0);
    const porDia = {};
    financeiro.filter(f=>f.tipo==='entrada').forEach(f=>{ porDia[f.data]=(porDia[f.data]||0)+f.valor; });
    const rows = Object.entries(porDia).map(([d,v])=>({label:fmtDate(d), value:v})).sort((a,b)=>b.value-a.value);
    body = `<div class="kpi" style="--kpi-color:var(--gold-600);max-width:280px;margin-bottom:18px;"><div class="kpi-label">Faturamento total (período)</div><div class="kpi-value">${fmtMoney(total)}</div></div>` + barList(rows,'R$', v=>fmtMoney(v));
  }
  return `
    <div class="tabs">${tabs.map(([k,l])=>`<button class="${st.tab===k?'active':''}" onclick="setReportTab('${k}')">${l}</button>`).join('')}</div>
    <div class="card card-pad">${body || '<div class="empty-state">Sem dados suficientes para este relatório ainda.</div>'}</div>`;
};
function barList(rows, unit, fmt){
  if(!rows.length) return '<div class="empty-state">Sem dados para exibir.</div>';
  const max = Math.max(...rows.map(r=>r.value),1);
  return rows.map(r=>`
    <div class="report-bar-row">
      <div class="label" title="${escapeHtml(r.label)}">${escapeHtml(r.label)}</div>
      <div class="report-bar-track"><div class="report-bar-fill" style="width:${(r.value/max*100).toFixed(0)}%;"></div></div>
      <div class="report-bar-val">${fmt?fmt(r.value):r.value+' '+unit}</div>
    </div>`).join('');
}
function setReportTab(t){ tableState('relatorios').tab=t; navigate('relatorios'); }

      </div>

};
async function testarConexaoAPI(){
  if(!USE_REMOTE_API){ toast('Nenhuma URL de API configurada — sistema em modo demonstração.','error'); return; }
  showLoader(true);
  try{
    const r = await fetch(APPS_SCRIPT_URL, {method:'GET'});
    const json = await r.json();
    showLoader(false);
    if(json.ok) toast('Conexão bem-sucedida com a API! Status: online.','success');
    else toast('A API respondeu, mas com erro: '+(json.error||'desconhecido'),'error');
  }catch(e){
    showLoader(false);
    toast('Não foi possível conectar à API. Verifique a URL e a implantação.','error');
  }
}

/* ---------- USUÁRIOS ---------- */
RENDERERS.usuarios = async function(){
  const raw = await api('listarUsuarios');
  const st = tableState('usuarios');
  const {pageData,total,pages} = applyTableControls('usuarios', raw, {searchKeys:['nome','usuario','perfil']});
  return `
    <div class="toolbar">
      <div class="search-box"><span>🔎</span><input placeholder="Pesquisar usuário..." value="${st.search||''}" oninput="searchTable('usuarios',this.value)"></div>
      <button class="btn btn-gold" onclick="openUsuarioModal()">+ Novo Usuário</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th onclick="sortTable('usuarios','nome')">Nome</th><th>Usuário</th><th>Perfil</th><th>Status</th><th style="text-align:right;">Ações</th></tr></thead>
      <tbody>${pageData.length?pageData.map(u=>`
        <tr><td class="cell-name">${u.nome}</td><td>${u.usuario}</td><td><span class="tag tag-confirmado">${u.perfil}</span></td>
        <td>${u.ativo?'<span class="tag tag-livre">Ativo</span>':'<span class="tag tag-cancelado">Inativo</span>'}</td>
        <td><div class="row-actions" style="justify-content:flex-end;">
          <button class="btn btn-outline btn-icon btn-sm" onclick="openUsuarioModal('${u.id}')">✎</button>
          <button class="btn btn-danger-outline btn-icon btn-sm" onclick="deleteUsuario('${u.id}')">🗑</button>
        </div></td></tr>`).join(''):`<tr><td colspan="5"><div class="empty-state">Nenhum usuário cadastrado.</div></td></tr>`}
      </tbody></table>${paginationHtml('usuarios',total,pages)}</div>`;
};
async function openUsuarioModal(id){
  const [list, profs] = await Promise.all([api('listarUsuarios'), api('listarProfissionais')]);
  const item = id?list.find(u=>u.id===id):null;
  openModal(`<div class="modal-head"><h3>${item?'Editar Usuário':'Novo Usuário'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="field full"><label>Nome</label><input id="us-nome" value="${item?escapeHtml(item.nome):''}"></div>
      <div class="field"><label>Usuário</label><input id="us-usuario" value="${item?item.usuario:''}"></div>
      <div class="field"><label>Senha</label><input id="us-senha" type="text" value="${item?item.senha:''}"></div>
      <div class="field"><label>Perfil</label><select id="us-perfil" onchange="onUsuarioPerfilChange()">
        <option value="Administrador" ${item&&item.perfil==='Administrador'?'selected':''}>Administrador</option>
        <option value="Recepcionista" ${item&&item.perfil==='Recepcionista'?'selected':''}>Recepcionista</option>
        <option value="Profissional" ${item&&item.perfil==='Profissional'?'selected':''}>Profissional</option>
      </select></div>
      <div class="field full" id="us-prof-field" style="${item&&item.perfil!=='Profissional'?'display:none;':''}">
        <label>Vincular ao Profissional</label>
        <select id="us-profissionalId">${profs.map(p=>`<option value="${p.id}" ${item&&item.profissionalId===p.id?'selected':''}>${p.nome}</option>`).join('')}</select>
      </div>
    </div></div>
    <div class="modal-foot">
      ${item?`<button class="btn btn-danger-outline" onclick="deleteUsuario('${item.id}')">Excluir</button>`:''}
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveUsuario('${item?item.id:''}')">Salvar</button>
    </div>`);
}
function onUsuarioPerfilChange(){
  document.getElementById('us-prof-field').style.display = document.getElementById('us-perfil').value==='Profissional' ? '' : 'none';
}
async function saveUsuario(id){
  const perfil = document.getElementById('us-perfil').value;
  const payload = {id:id||undefined, nome:document.getElementById('us-nome').value.trim(), usuario:document.getElementById('us-usuario').value.trim(),
    senha:document.getElementById('us-senha').value, perfil, ativo:true,
    profissionalId: perfil==='Profissional' ? document.getElementById('us-profissionalId').value : undefined};
  if(!payload.nome || !payload.usuario || !payload.senha){ toast('Preencha nome, usuário e senha.','error'); return; }
  showLoader(true);
  try{ await api('salvarUsuario',payload); showLoader(false); closeModal(); toast('Usuário salvo.','success'); navigate('usuarios'); }
  catch(e){ showLoader(false); toast('Erro ao salvar.','error'); }
}
async function deleteUsuario(id){
  if(!confirm('Excluir este usuário?')) return;
  showLoader(true);
  try{ await api('excluirUsuario',{id}); showLoader(false); toast('Usuário excluído.','success'); navigate('usuarios'); }
  catch(e){ showLoader(false); toast('Erro ao excluir.','error'); }
}
</script>
